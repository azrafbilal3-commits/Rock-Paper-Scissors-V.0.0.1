<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h2>Rock Paper Scissors</h2>
            <p class="you">Your area is at the bottom!</p>
             <!-- score -->
            <div class="CalculateScore">
                <p>You: <span class="score">0</span></p>
                <p>Bot: <span class="score">0</span></p>
            </div>
            <h3 id="phraseScore"></h3>
            
            <div class="content">
                <div class="imageChoice">
                    <div >
                         <img id="imageRobo" src="rock.jpg" alt="image" />  
                    </div>
                </div>
            </div>
            <div class="content">
                   
                <div class="imageChoice">
                    <div>
                        <img id="imageUser" src="rock.jpg" alt="image" />
                    </div>
                </div>
            </div>
            
            <div class="btnUserPlay">
                <button id="rock">rock</button>
                <button id="paper">paper</button>
                <button id="scissors">scissors</button>
            </div>
            
            
        </header>
        
        <input type="checkbox">
        
        
        
        
        
    </div>
    
    
    
    <script src="main.js"></script>
</body>

</html>
